<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Modern Client Launcher</title>
  <meta name="description" content="Modern Client Launcher" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg:      #0f131c;
      --panel:   #1b1f28;
      --panel-2: #232937;
      --text:    #f2f5ff;
      --muted:   #aab3c7;
      --gold:    #e1b741;
      --gold-lo: rgba(225,183,65,0.18);
      --line:    #2f3647;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; image-rendering: pixelated; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
    }

    /* ─── APP SHELL ─── */
    .app {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      padding: 1.2rem 1.25rem 2.5rem;
    }

    .app::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 55%, rgba(5,8,16,0.65) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── BACKGROUND ─── */
    .bg-layer {
      position: absolute;
      inset: -10%;
      pointer-events: none;
    }

    .bg-image {
      background-image: url("assets/background/modernclient_main_menu.png");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      transform: scale(1.15);
      filter: blur(5px) brightness(0.72);
      will-change: transform;
    }

    .bg-image::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 22% 38%, rgba(225,183,65,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 55% 70% at 80% 65%, rgba(30,60,120,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 90% 50% at 50% 105%, rgba(0,0,0,0.55) 0%, transparent 60%),
        linear-gradient(160deg, #0d1020 0%, #121828 40%, #0a0f18 100%);
      z-index: -1;
    }

    /* ─── DISCORD BUTTON ─── */
    .discord-btn {
      position: fixed;
      right: 16px; top: 16px;
      z-index: 30;
      width: 58px; height: 58px;
      border-radius: 14px;
      border: 1px solid #3a4155;
      background: rgba(27,31,40,0.92);
      box-shadow: 0 10px 20px rgba(0,0,0,0.42);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      text-decoration: none;
    }
    .discord-btn:hover {
      transform: translateY(-2px) scale(1.06);
      border-color: var(--gold);
      box-shadow: 0 14px 24px rgba(0,0,0,0.52), 0 0 14px rgba(225,183,65,0.2);
    }
    .discord-btn img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      image-rendering: auto;
    }
    .discord-btn-fallback {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
      font-size: 26px;
    }

    /* ─── HEADER ─── */
    .header {
      position: relative; z-index: 1;
      max-width: 1050px;
      margin: 0 auto 0.4rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 140px;
    }

    .main-logo {
      width: min(560px, 88vw);
      height: auto;
      filter: drop-shadow(0 0 10px rgba(225,183,65,0.45)) drop-shadow(0 0 22px rgba(225,183,65,0.25));
      image-rendering: auto;
    }

    .logo-fallback {
      display: none;
      font-family: "Press Start 2P", monospace;
      font-size: clamp(16px, 3.2vw, 34px);
      letter-spacing: 0.06em;
      line-height: 1.6;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 12px rgba(225,183,65,0.55), 0 0 35px rgba(225,183,65,0.28);
    }
    .logo-fallback span { color: var(--gold); }

    /* ─── SHARED CARD ─── */
    .card {
      position: relative; z-index: 1;
      max-width: 1050px;
      margin: 0 auto 1rem;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(35,41,55,0.90), rgba(27,31,40,0.96));
      border-radius: 0;
      box-shadow: 0 14px 38px rgba(0,0,0,0.42);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
    }

    /* ─── LAUNCHER CARD ─── */
    .launcher {
      display: flex;
      justify-content: center;
      padding: 1.4rem 1.2rem 1.6rem;
    }

    .launcher-center {
      width: min(520px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hotfix-title {
      margin: 0 0 0.55rem;
      font-family: "Press Start 2P", monospace;
      font-size: 0.78rem;
      color: #ffecb3;
      text-align: center;
      text-shadow: 0 0 14px rgba(255,236,179,0.4);
    }

    .eyebrow {
      margin: 0 0 0.6rem;
      color: var(--gold);
      font-size: 0.95rem;
      font-family: "JetBrains Mono", monospace;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    /* ─── DROPDOWN ─── */
    .dropdown {
      position: relative;
      width: min(380px, 100%);
      outline: none;
    }

    .mc-btn {
      border: 1px solid #3a4155;
      border-radius: 0;
      background: var(--panel);
      color: var(--text);
      position: relative;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .mc-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
    }
    .mc-btn:hover {
      transform: scale(1.03);
      background: #2a2f3a;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }
    .mc-btn:active { transform: scale(0.98); }

    .dropdown-btn {
      width: 100%;
      padding: 0.75rem 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: "Press Start 2P", monospace;
      font-size: 0.72rem;
    }

    .arrow {
      display: inline-block;
      transition: transform 0.22s ease;
      line-height: 1;
    }
    .arrow.open { transform: rotate(180deg); }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 0.4rem);
      left: 0; right: 0;
      border: 1px solid #3a4155;
      background: #111620;
      border-radius: 0;
      overflow: hidden;
      z-index: 20;
      animation: pop 0.18s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(-6px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .dropdown-menu button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid #222a38;
      background: transparent;
      text-align: left;
      padding: 0.7rem 0.8rem;
      cursor: pointer;
      font-family: "Press Start 2P", monospace;
      font-size: 0.68rem;
      color: var(--text);
      transition: background 0.15s;
      image-rendering: auto;
    }
    .dropdown-menu button:last-child { border-bottom: 0; }
    .dropdown-menu button:hover  { background: #2b3448; }
    .dropdown-menu button.active { background: #2b3448; color: var(--gold); }
    .dropdown-menu button.active::before { content: '▶  '; font-size: 0.5rem; opacity: 0.7; }

    /* ─── LAUNCH BUTTON ─── */
    .launch-btn {
      margin-top: 1.2rem;
      width: min(340px, 100%);
      min-height: 48px;
      padding: 0.78rem 1.2rem;
      font-family: "Press Start 2P", monospace;
      font-size: 0.9rem;
      border-color: #cfa63b;
      background: var(--panel);
      color: #ffecb3;
      overflow: hidden;
    }
    .launch-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    .launch-btn:hover {
      background: #252b38;
      box-shadow: 0 0 0 1px var(--gold), 0 12px 28px rgba(0,0,0,0.5), 0 0 28px rgba(225,183,65,0.15);
    }

    /* ─── LOADING STATE ON LAUNCH BUTTON ─── */
    .launch-btn.loading {
      opacity: 0.6;
      cursor: wait;
      pointer-events: none;
    }

    /* ─── BETA WARNING ─── */
    .beta-warning {
      position: fixed;
      left: 50%;
      bottom: 16px;
      width: min(980px, calc(100vw - 32px));
      z-index: 25;
      border: 1px solid #3a4155;
      background: var(--panel);
      color: #ffecb3;
      font-family: "Press Start 2P", monospace;
      font-size: 0.6rem;
      line-height: 1.45;
      padding: 10px 12px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.45);
    }
    .beta-warning::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
    }

    /* ─── ENTRANCE ANIMATIONS ─── */
    .in-up {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.42s ease, transform 0.42s ease;
    }
    .in-up.delay-1 { transition-delay: 0.08s; }
    .in-up.delay-2 { transition-delay: 0.16s; }
    .in-up.show    { opacity: 1; transform: translateY(0); }

    .beta-warning                { transform: translateX(-50%); }
    .beta-warning.in-up          { opacity: 0; transform: translateX(-50%) translateY(18px); }
    .beta-warning.in-up.show     { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 880px) {
      .main-logo { width: min(500px, 94vw); }
      .beta-warning { font-size: 0.52rem; line-height: 1.35; }
    }
    @media (max-width: 480px) {
      .launch-btn { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <div id="app" class="app" @mousemove="onMouseMove">

    <div class="bg-layer bg-image" ref="bgEl"></div>

    <a
      class="discord-btn in-up delay-1"
      :class="{show: ready}"
      href="https://discord.gg/bTnDKTmD3q"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Join Discord">
      <img
        src="assets/buttons/discord.png"
        alt="Discord"
        draggable="false"
        style="image-rendering:auto"
        @error="$event.target.style.display='none'; $event.target.nextElementSibling.style.display='flex'"
      />
      <div class="discord-btn-fallback" aria-hidden="true">💬</div>
    </a>

    <header class="header in-up" :class="{show: ready}">
      <img
        class="main-logo"
        src="assets/title/modernclient_title.png"
        alt="Modern Client"
        draggable="false"
        @error="$event.target.style.display='none'; $refs.logoFallback.style.display='block'"
      />
      <div class="logo-fallback" ref="logoFallback">
        MODERN<br><span>CLIENT</span>
      </div>
    </header>

    <main class="launcher card in-up delay-1" :class="{show: ready}">
      <div class="launcher-center">

        <p class="hotfix-title">Beta 2.0.1 Update!</p>
        <p class="eyebrow">Select Build</p>

        <div
          class="dropdown"
          @click="openDropdown = !openDropdown"
          @keydown.enter.prevent="openDropdown = !openDropdown"
          @keydown.escape="openDropdown = false"
          tabindex="0"
          role="listbox"
          :aria-expanded="openDropdown"
          aria-label="Build selector">

          <button class="dropdown-btn mc-btn" type="button">
            <strong>{{ selectedBuild.label }}</strong>
            <span class="arrow" :class="{open: openDropdown}" aria-hidden="true">⌄</span>
          </button>

          <div class="dropdown-menu" v-show="openDropdown">
            <button
              v-for="option in buildOptions"
              :key="option.value"
              type="button"
              class="mc-btn"
              :class="{active: option.value === selectedBuild.value}"
              @click.stop="selectBuild(option)">
              {{ option.label }}
            </button>
          </div>
        </div>

        <button
          class="btn mc-btn launch-btn"
          :class="{loading: launching}"
          type="button"
          @click="launchSelectedBuild">
          {{ launching ? 'Loading...' : 'Launch' }}
        </button>

      </div>
    </main>

    <div class="beta-warning in-up delay-2" :class="{show: ready}">
      Warning! Modern Client is currently in Beta Testing. If you would like to give feedback on the client please check out the discord server at the top right of the website!
    </div>

  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp } = Vue;
 
    // ─────────────────────────────────────────────────────────────────
    // 👇 REPLACE with your GitHub username and repo name
    //    e.g. 'notskrib/modern-client-builds'
    const GITHUB_REPO = 'starifiedmc/modernclient';
    const BRANCH      = 'main';
    // ─────────────────────────────────────────────────────────────────

    const CDN_BASE = `https://cdn.jsdelivr.net/gh/${GITHUB_REPO}@${BRANCH}`;

    createApp({
      data() {
        return {
          ready:      false,
          launching:  false,
          openDropdown: false,
          buildOptions: [
            { value: 'js',   label: 'JavaScript Build' },
            { value: 'wasm', label: 'WASM Build'        },
          ],
          selectedBuild: { value: 'wasm', label: 'WASM Build' },
        };
      },

      methods: {
        selectBuild(option) {
          this.selectedBuild = option;
          this.openDropdown  = false;
        },

        launchSelectedBuild() {
          if (this.launching) return;

          const path = this.selectedBuild.value === 'wasm'
            ? '/wasm/index.html'
            : '/js/index.html';

          // Cache-bust so jsDelivr always returns the latest version
          const url = `${CDN_BASE}${path}?t=${Date.now()}`;

          this.launching = true;

          fetch(url)
            .then(r => {
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              return r.text();
            })
            .then(html => {
              // Open a blank tab and write the fetched HTML into it —
              // same technique used for running single-file apps via jsDelivr
              const newWin = window.open('about:blank', '_blank');
              if (newWin) {
                newWin.document.open();
                newWin.document.write(html);
                newWin.document.close();
              } else {
                alert('Popup blocked — please allow popups for this site and try again.');
              }
            })
            .catch(err => {
              console.error('Launch failed:', err);
              alert('Failed to load the build. Check the console for details.');
            })
            .finally(() => {
              this.launching = false;
            });
        },

        onMouseMove(event) {
          const w = window.innerWidth  || 1;
          const h = window.innerHeight || 1;
          this._targetX = event.clientX / w;
          this._targetY = event.clientY / h;
        },
      },

      mounted() {
        requestAnimationFrame(() => { this.ready = true; });

        let curX = 0.5, curY = 0.5;
        this._targetX = 0.5;
        this._targetY = 0.5;

        const bgEl  = this.$refs.bgEl;
        const LERP  = 0.055;
        const MAX_X = 28;
        const MAX_Y = 22;

        const tick = () => {
          curX += (this._targetX - curX) * LERP;
          curY += (this._targetY - curY) * LERP;
          const tx = (curX - 0.5) * MAX_X;
          const ty = (curY - 0.5) * MAX_Y;
          if (bgEl) bgEl.style.transform = `translate(${tx}px, ${ty}px) scale(1.15)`;
          requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);

        document.addEventListener('click', (e) => {
          const dd = document.querySelector('.dropdown');
          if (!dd) return;
          if (!dd.contains(e.target)) this.openDropdown = false;
        });
      },
    }).mount('#app');
  </script>
</body>
</html>
